services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-vitalstream}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-vitalstream}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-change-me}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      DB_NAME: ${DB_NAME:-vitalstream}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ./backend:/app
      - media:/app/media
      - static:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  mobile:
    build:
      context: .
      dockerfile: Dockerfile.mobile
    restart: unless-stopped
    environment:
      # The browser runs on the host, so it talks to the backend via host-exposed port 8000.
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://localhost:8000/api}
    volumes:
      - ./mobile:/app
      - mobile_node_modules:/app/node_modules
    ports:
      - "19006:19006"
      - "8081:8081"
      - "19000:19000"
    depends_on:
      - backend

volumes:
  pgdata:
  media:
  static:
  mobile_node_modules:
